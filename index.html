<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hokuspokus Test</title>
<style>
  :root{--bg:#0b0d12;--card:#151823;--accent:#7c5cff;--text:#e8eaf0;--muted:#9aa0b4}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:radial-gradient(1200px 600px at 70% -10%,#1d2233,var(--bg));color:var(--text);min-height:100vh;display:grid;place-items:center;padding:24px}
  .card{background:var(--card);border:1px solid #232838;border-radius:18px;max-width:520px;width:100%;overflow:hidden;box-shadow:0 30px 60px -20px rgba(0,0,0,.6)}
  .hero{display:block;width:100%;height:auto;aspect-ratio:800/360;object-fit:cover}
  .body{padding:28px}
  .tag{font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:700}
  h1{font-size:1.9rem;margin:.4rem 0 .8rem;line-height:1.15}
  p{color:var(--muted);line-height:1.6}
</style>
</head>
<body>
  <main class="card">
    <img class="hero" src="https://picsum.photos/seed/hokus/800/360" alt="Hero-Bild Hokuspokus" loading="lazy">
    <div class="body">
      <span class="tag">Hokuspokus Test</span>
      <h1>Es funktioniert! ✨</h1>
      <p>Diese kompakte Testseite bestätigt, dass alles sauber lädt – inklusive Hero-Bild, modernem Dark-Design und responsivem Layout. Bereit für den nächsten Zaubertrick.</p>
    </div>
  </main>
</body>
</html>
